# .goreleaser.yml
version: 2
project_name: git-lord

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    main: ./cmd/git-lord
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: ["zip"]

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ .Version }}-next"

changelog:
  use: conventional
  sort: asc
  groups:
    - title: Features
      regexp: "^.*feat(?:\\([^)]+\\))?:.*$"
      order: 0
    - title: Bug Fixes
      regexp: "^.*fix(?:\\([^)]+\\))?:.*$"
      order: 1
    - title: Documentation
      regexp: "^.*docs(?:\\([^)]+\\))?:.*$"
      order: 2
    - title: Performance Improvements
      regexp: "^.*perf(?:\\([^)]+\\))?:.*$"
      order: 3
    - title: Code Refactoring
      regexp: "^.*refactor(?:\\([^)]+\\))?:.*$"
      order: 4
    - title: Tests
      regexp: "^.*test(?:\\([^)]+\\))?:.*$"
      order: 5
    - title: Build System & CI
      regexp: "^.*(?:build|ci|chore)(?:\\([^)]+\\))?:.*$"
      order: 6
    - title: Other Changes
      order: 999
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - Merge pull request
      - Merge branch

homebrew_casks:
  - name: git-lord
    repository:
      owner: chege
      name: homebrew-tap
      branch: main
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    directory: Casks
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    commit_msg_template: "Brew cask update for {{ .ProjectName }} version {{ .Tag }}"
    homepage: "https://github.com/chege/git-lord"
    description: "High-performance Git contributor intelligence suite"
    binaries:
      - git-lord
    url:
      template: "https://github.com/chege/git-lord/releases/download/{{ .Tag }}/{{ .ArtifactName }}"
    skip_upload: auto
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/git-lord"]
          end
